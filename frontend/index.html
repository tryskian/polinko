<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polinko UI</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <div class="bar-left">
          <p class="bar-title">Ready to dive in.</p>
          <div class="chat-controls">
            <select id="chat-select" class="chat-select" aria-label="Select chat"></select>
            <button id="new-chat" type="button" class="new-chat">New chat</button>
          </div>
        </div>
        <button id="reset" type="button" class="reset" aria-label="Reset session" title="Reset session">
          <span class="material-symbols-outlined" aria-hidden="true">history</span>
        </button>
      </header>
      <section id="chat" class="chat" aria-live="polite">
        <p id="empty-state" class="empty-state">Ready to dive in.</p>
      </section>
      <form id="composer" class="composer">
        <div class="composer-inner">
          <textarea
            id="message"
            placeholder="message bigbrain"
            autocomplete="off"
            rows="1"
            required
          ></textarea>
          <div class="composer-row">
            <button type="submit" class="send" aria-label="Send">
              <span class="material-symbols-outlined" aria-hidden="true">north</span>
            </button>
          </div>
        </div>
      </form>
    </main>
  </body>
</html>
