<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POLINKOfolio Interface Board</title>
  </head>
  <body>
    <canvas id="webgl-stage" aria-hidden="true"></canvas>
    <main class="board-wrap" aria-label="Portfolio interface layout board">
      <section class="board" role="presentation">
        <section id="hero" class="section hero"></section>
        <section id="intro" class="section intro"></section>
        <section id="horizontal-chapter" class="horizontal-chapter" aria-label="Beta 1 pipeline, Sankey bridge, and Beta 2 pipeline">
          <div id="horizontal-track" class="horizontal-track">
            <section id="pipeline-one" class="horizontal-panel pipeline-one"></section>
            <section id="beta-one-sankey" class="horizontal-panel sankey beta-one-sankey" aria-label="Beta 1.0 Sankey">
              <svg id="beta-one-sankey-svg" class="sankey-svg" role="img" aria-label="Beta 1.0 Sankey"></svg>
            </section>
            <section id="sankey-bridge" class="horizontal-panel sankey-bridge" aria-label="Bridge from Beta 1.0 to Beta 2.0"></section>
            <section id="beta-two-sankey" class="horizontal-panel sankey beta-two-sankey" aria-label="Beta 2.0 Sankey">
              <svg id="beta-two-sankey-svg" class="sankey-svg" role="img" aria-label="Beta 2.0 Sankey"></svg>
            </section>
            <section id="pipeline-two" class="horizontal-panel pipeline-two"></section>
          </div>
        </section>
        <section id="conclusion" class="section conclusion"></section>
        <section id="about-lab" class="section about-lab"></section>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
