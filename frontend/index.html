<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polinko UI</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <div class="bar-left">
          <button id="drawer-toggle" type="button" class="drawer-toggle" aria-label="Open chats">
            <span class="material-symbols-outlined" aria-hidden="true">menu</span>
          </button>
          <p class="bar-title">Ready to dive in.</p>
        </div>
        <div class="bar-actions">
          <button id="theme-toggle" type="button" class="header-icon" aria-label="Toggle theme" title="Toggle theme">
            <span id="theme-toggle-icon" class="material-symbols-outlined" aria-hidden="true">light_mode</span>
          </button>
          <label for="memory-scope-select" class="visually-hidden">Memory scope</label>
          <select
            id="memory-scope-select"
            class="memory-scope-select"
            aria-label="Memory scope"
            title="Memory scope for this chat"
          >
            <option value="global">Global memory</option>
            <option value="session">This chat</option>
          </select>
          <button
            id="export-markdown"
            type="button"
            class="header-icon"
            aria-label="Download transcript markdown"
            title="Download transcript markdown"
          >
            <span class="material-symbols-outlined" aria-hidden="true">description</span>
          </button>
          <button
            id="export-json"
            type="button"
            class="header-icon"
            aria-label="Download transcript json"
            title="Download transcript json"
          >
            <span class="material-symbols-outlined" aria-hidden="true">download</span>
          </button>
          <button
            id="export-ocr"
            type="button"
            class="header-icon"
            aria-label="Download OCR run history"
            title="Download OCR run history"
          >
            <span class="material-symbols-outlined" aria-hidden="true">fact_check</span>
          </button>
          <button id="reset" type="button" class="reset" aria-label="Reset session" title="Reset session">
            <span class="material-symbols-outlined" aria-hidden="true">history</span>
          </button>
        </div>
      </header>
      <aside id="chat-drawer" class="chat-drawer" aria-label="Chats">
        <div class="drawer-head">
          <p class="drawer-title">Chats</p>
        </div>
        <button id="new-chat" type="button" class="new-chat">New chat</button>
        <div id="chat-list" class="chat-list" role="listbox" aria-label="Chat threads"></div>
      </aside>
      <button id="drawer-backdrop" type="button" class="drawer-backdrop" aria-label="Close chats"></button>
      <section id="chat" class="chat" aria-live="polite">
        <p id="empty-state" class="empty-state">Ready to dive in.</p>
      </section>
      <form id="composer" class="composer">
        <div class="composer-inner">
          <input id="ocr-file-input" class="visually-hidden" type="file" accept="image/*" aria-hidden="true" tabindex="-1" />
          <textarea
            id="message"
            placeholder="message bigbrain"
            autocomplete="off"
            rows="1"
            required
          ></textarea>
          <div class="composer-row">
            <div class="composer-actions">
              <button
                id="memory-search-toggle"
                type="button"
                class="icon-button"
                aria-label="Search indexed memory"
                title="Search indexed memory"
              >
                <span class="material-symbols-outlined" aria-hidden="true">search</span>
              </button>
              <button id="ocr-upload" type="button" class="icon-button" aria-label="Upload for OCR" title="Upload for OCR">
                <span class="material-symbols-outlined" aria-hidden="true">attach_file</span>
              </button>
            </div>
            <button type="submit" class="send" aria-label="Send">
              <span class="material-symbols-outlined" aria-hidden="true">north</span>
            </button>
          </div>
        </div>
      </form>
    </main>
  </body>
</html>
