<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polinko UI</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <div class="bar-left">
          <button id="drawer-toggle" type="button" class="drawer-toggle" aria-label="Open chats">
            <span class="material-symbols-outlined" aria-hidden="true">menu</span>
          </button>
          <p class="bar-title">Ready to dive in.</p>
        </div>
        <button id="reset" type="button" class="reset" aria-label="Reset session" title="Reset session">
          <span class="material-symbols-outlined" aria-hidden="true">history</span>
        </button>
      </header>
      <aside id="chat-drawer" class="chat-drawer" aria-label="Chats">
        <div class="drawer-head">
          <p class="drawer-title">Chats</p>
          <button id="drawer-close" type="button" class="drawer-close" aria-label="Close chats">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </div>
        <button id="new-chat" type="button" class="new-chat">New chat</button>
        <div id="chat-list" class="chat-list" role="listbox" aria-label="Chat threads"></div>
      </aside>
      <button id="drawer-backdrop" type="button" class="drawer-backdrop" aria-label="Close chats"></button>
      <section id="chat" class="chat" aria-live="polite">
        <p id="empty-state" class="empty-state">Ready to dive in.</p>
      </section>
      <form id="composer" class="composer">
        <div class="composer-inner">
          <textarea
            id="message"
            placeholder="message bigbrain"
            autocomplete="off"
            rows="1"
            required
          ></textarea>
          <div class="composer-row">
            <button type="submit" class="send" aria-label="Send">
              <span class="material-symbols-outlined" aria-hidden="true">north</span>
            </button>
          </div>
        </div>
      </form>
    </main>
  </body>
</html>
