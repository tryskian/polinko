<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POLINKOfolio Interface Board</title>
  </head>
  <body>
    <canvas id="webgl-stage" aria-hidden="true"></canvas>
    <main class="board-wrap" aria-label="Portfolio interface layout board">
      <section class="board" role="presentation">
        <section id="hero" class="section hero"></section>
        <section id="intro" class="section intro"></section>
        <section id="pipeline-one" class="section pipeline-one"></section>
        <section id="sankey-film" class="section sankey-film" aria-label="Twin Sankey filmstrip">
          <svg id="sankey-svg" class="sankey-svg" role="img" aria-label="Twin mirrored Sankey"></svg>
        </section>
        <section id="pipeline-two" class="section pipeline-two"></section>
        <section id="conclusion" class="section conclusion"></section>
        <section id="about-lab" class="section about-lab"></section>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
