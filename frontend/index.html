<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POLINKOfolio Interface Board</title>
  </head>
  <body>
    <canvas id="webgl-stage" aria-hidden="true"></canvas>
    <main class="board-wrap" aria-label="Portfolio interface layout board">
      <section class="board" role="presentation">
        <section id="hero" class="block hero" data-label="hero"></section>
        <section id="intro" class="block intro" data-label="intro"></section>
        <section id="pipeline-one" class="block pipeline-one" data-label="pipeline 1"></section>
        <section id="sankey-one" class="block sankey-one" data-label="sankey 1"></section>
        <section id="sankey-two" class="block sankey-two" data-label="sankey 2"></section>
        <section id="pipeline-two" class="block pipeline-two" data-label="pipeline 2"></section>
        <section id="conclusion" class="block conclusion" data-label="conclusion"></section>
        <section id="about" class="block about" data-label="about/lab"></section>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
