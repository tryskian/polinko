name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build hygiene
        env:
          OPENAI_API_KEY: sk-test-key-123456789012345
          POLINKO_SERVER_API_KEY: test-server-key
        run: make build-hygiene-core PYTHON=python

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Docs checks
        run: make ci-docs PYTHON=python

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Editable package install
        run: make package-install-check PYTHON=python
      - name: Unit tests
        env:
          OPENAI_API_KEY: sk-test-key-123456789012345
          POLINKO_SERVER_API_KEY: test-server-key
        run: make ci-test PYTHON=python

  python-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff checks
        run: make ci-python-style PYTHON=python

  python-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Mypy checks
        run: make ci-python-type-check PYTHON=python

  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install audit and locked deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Python security and lock check
        run: make ci-python-security PYTHON=python

  node-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Audit Node dependencies
        run: make ci-node-security
