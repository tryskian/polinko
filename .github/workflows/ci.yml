name: CI

on:
  push:
  pull_request:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Docs checks
        run: make ci-docs PYTHON=python

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Unit tests
        env:
          OPENAI_API_KEY: sk-test-key-123456789012345
          POLINKO_SERVER_API_KEY: test-server-key
        run: make ci-test PYTHON=python

  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install audit and locked deps
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -r requirements.lock
      - name: Python security and lock check
        run: make ci-python-security PYTHON=python

  node-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Node dependencies
        run: npm ci
      - name: Audit Node dependencies
        run: make ci-node-security
