name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Unit tests
        env:
          OPENAI_API_KEY: sk-test-key-123456789012345
          POLINKO_SERVER_API_KEY: test-server-key
        run: make test PYTHON=python
